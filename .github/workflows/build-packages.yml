name: build-packages

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  APP_NAME: zju-connect-gui
  GO_VERSION: '1.25.6'
  ZJU_CONNECT_REF: 5c0ac04ade80f90a67038aec240d470f122782e5
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run backend tests
        run: go test ./internal/backend

      - name: Install Linux native UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build native desktop app
        run: go build -tags gtk4 .

  package:
    name: Package ${{ matrix.target_os }}/${{ matrix.goarch }}
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: windows
            goos: windows
            goarch: amd64
            runner: windows-latest
            archive_suffix: .zip
            wintun_arch: amd64
          - target_os: linux
            goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            archive_suffix: .tar.gz
            wintun_arch: ''
          - target_os: linux
            goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive_suffix: .tar.gz
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive_suffix: .zip
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: arm64
            runner: macos-14
            archive_suffix: .zip
            wintun_arch: ''

    env:
      TARGET_OS: ${{ matrix.target_os }}
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      ARTIFACT_NAME: ${{ format('zju-connect-gui-{0}-{1}', matrix.target_os, matrix.goarch) }}
      ARCHIVE_PATH: ${{ format('dist/zju-connect-gui-{0}-{1}{2}', matrix.target_os, matrix.goarch, matrix.archive_suffix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout upstream zju-connect
        uses: actions/checkout@v6
        with:
          repository: silicer/zju-connect
          ref: ${{ env.ZJU_CONNECT_REF }}
          path: _deps/zju-connect
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            _deps/zju-connect/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup MSYS2
        if: matrix.target_os == 'windows'
        id: setup-msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtk4

      - name: Install Linux build dependencies
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build upstream zju-connect
        if: matrix.target_os != 'windows'
        shell: bash
        working-directory: _deps/zju-connect
        run: |
          mkdir -p "$RUNNER_TEMP/zju-connect-build"
          output_name="zju-connect"
          if [[ "$TARGET_OS" == "windows" ]]; then
            output_name="zju-connect.exe"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -o "$RUNNER_TEMP/zju-connect-build/$output_name" .

      - name: Build upstream zju-connect (Windows)
        if: matrix.target_os == 'windows'
        shell: msys2 {0}
        working-directory: _deps/zju-connect
        run: |
          runner_temp="$(cygpath -u "$RUNNER_TEMP")"
          mkdir -p "$runner_temp/zju-connect-build"
          CGO_ENABLED=0 go build -trimpath -o "$runner_temp/zju-connect-build/zju-connect.exe" .

      - name: Download wintun runtime
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'wintun'
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          Invoke-WebRequest -Uri $env:WINTUN_URL -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

      - name: Build native app (Windows)
        if: matrix.target_os == 'windows'
        shell: msys2 {0}
        run: |
          runner_temp="$(cygpath -u "$RUNNER_TEMP")"
          mkdir -p "$runner_temp/app-build"
          export PATH="/mingw64/bin:$PATH"
          export GTK_ROOT="/mingw64"
          export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:/mingw64/share/pkgconfig"
          pkg-config --cflags gtk4
          pkg-config --libs gtk4
          gcc --version
          go build -tags gtk4 -trimpath -ldflags='-H=windowsgui' -o "$runner_temp/app-build/${APP_NAME}.exe" .

      - name: Build native app (non-Windows)
        if: matrix.target_os != 'windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/app-build"
          build_tags=""
          if [[ "$TARGET_OS" == "linux" ]]; then
            build_tags="-tags gtk4"
          fi
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 go build $build_tags -trimpath -o "$RUNNER_TEMP/app-build/$APP_NAME" .

      - name: Stage package contents
        if: matrix.target_os != 'windows'
        shell: bash
        run: |
          app_binary="$RUNNER_TEMP/app-build/$APP_NAME"
          args=(
            --target-os "$TARGET_OS"
            --arch "$GOARCH"
            --artifact-name "$ARTIFACT_NAME"
            --staging-root "$RUNNER_TEMP/stage"
            --app-binary "$app_binary"
          )
          args+=(--zju-connect "$RUNNER_TEMP/zju-connect-build/zju-connect")
          python scripts/package_ci_artifact.py "${args[@]}"

      - name: Stage package contents (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          $appBinary = Join-Path $env:RUNNER_TEMP "app-build/$($env:APP_NAME).exe"
          $zjuConnect = Join-Path $env:RUNNER_TEMP 'zju-connect-build/zju-connect.exe'
          $wintun = Join-Path $env:RUNNER_TEMP 'wintun/wintun/bin/${{ matrix.wintun_arch }}/wintun.dll'
          $windowsRuntimeRoot = Join-Path '${{ steps.setup-msys2.outputs.msys2-location }}' 'mingw64'
          $stagingRoot = Join-Path $env:RUNNER_TEMP 'stage'
          python scripts/package_ci_artifact.py `
            --target-os windows `
            --arch $env:GOARCH `
            --artifact-name $env:ARTIFACT_NAME `
            --staging-root $stagingRoot `
            --app-binary $appBinary `
            --zju-connect $zjuConnect `
            --wintun $wintun `
            --windows-runtime-root $windowsRuntimeRoot

      - name: Create Linux archive
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "$RUNNER_TEMP/stage" -czf "$ARCHIVE_PATH" "$ARTIFACT_NAME"
          test -f "$ARCHIVE_PATH"

      - name: Create macOS archive
        if: matrix.target_os == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/stage/$ARTIFACT_NAME" "$ARCHIVE_PATH"
          test -f "$ARCHIVE_PATH"

      - name: Create Windows archive
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          if (Test-Path $env:ARCHIVE_PATH) {
            Remove-Item -Force $env:ARCHIVE_PATH
          }
          Compress-Archive -Path (Join-Path $env:RUNNER_TEMP "stage/$($env:ARTIFACT_NAME)") -DestinationPath $env:ARCHIVE_PATH
          if (-not (Test-Path $env:ARCHIVE_PATH)) {
            throw "Missing archive at $env:ARCHIVE_PATH"
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          archive: false
          if-no-files-found: error
