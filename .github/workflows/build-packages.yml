name: build-packages

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  APP_NAME: zju-connect-gui
  GO_VERSION: '1.25.6'
  ZJU_CONNECT_REF: 5c0ac04ade80f90a67038aec240d470f122782e5
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip
  GVSBUILD_GTK4_URL: https://github.com/wingtk/gvsbuild/releases/download/2026.3.0/GTK4_Gvsbuild_2026.3.0_x64.zip
  GVSBUILD_GTK4_SHA256: dc6ea6014a691c0843e02ffa0ad3dd07e8fb8cd3bbefb300a2080344b3842ece

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run backend tests
        run: go test ./internal/backend

      - name: Install Linux native UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build native desktop app
        run: go build -tags gtk4 .

  package:
    name: Package ${{ matrix.target_os }}/${{ matrix.goarch }}
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: windows
            goos: windows
            goarch: amd64
            runner: ubuntu-24.04
            archive_suffix: .zip
            wintun_arch: amd64
          - target_os: linux
            goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            archive_suffix: .tar.gz
            wintun_arch: ''
          - target_os: linux
            goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive_suffix: .tar.gz
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive_suffix: .zip
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: arm64
            runner: macos-14
            archive_suffix: .zip
            wintun_arch: ''

    env:
      TARGET_OS: ${{ matrix.target_os }}
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      ARTIFACT_NAME: ${{ format('zju-connect-gui-{0}-{1}', matrix.target_os, matrix.goarch) }}
      ARCHIVE_PATH: ${{ format('dist/zju-connect-gui-{0}-{1}{2}', matrix.target_os, matrix.goarch, matrix.archive_suffix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout upstream zju-connect
        uses: actions/checkout@v6
        with:
          repository: silicer/zju-connect
          ref: ${{ env.ZJU_CONNECT_REF }}
          path: _deps/zju-connect
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            _deps/zju-connect/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Linux build dependencies
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Windows cross-compilation dependencies
        if: matrix.target_os == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 g++-mingw-w64 binutils-mingw-w64 pkg-config zip unzip curl

      - name: Download Windows GTK4 bundle
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          bundle_dir="$RUNNER_TEMP/gtk4-bundle"
          bundle_zip="$bundle_dir/gtk4.zip"
          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"
          curl -fsSL "$GVSBUILD_GTK4_URL" -o "$bundle_zip"
          echo "$GVSBUILD_GTK4_SHA256  $bundle_zip" | sha256sum -c -
          unzip -q "$bundle_zip" -d "$bundle_dir/root"

      - name: Prepare Windows GTK4 bundle
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          gtk_root="$RUNNER_TEMP/gtk4-bundle/root"
          export GTK_ROOT="$gtk_root"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          gtk_root = Path(os.environ["GTK_ROOT"])
          github_env = Path(os.environ["GITHUB_ENV"])
          if not (gtk_root / "bin").is_dir():
              children = [child for child in gtk_root.iterdir() if child.is_dir()]
              if len(children) == 1 and (children[0] / "bin").is_dir():
                  nested_root = children[0]
                  for child in nested_root.iterdir():
                      child.rename(gtk_root / child.name)
                  nested_root.rmdir()

          pkgconfig_dirs = sorted(
              {
                  pkgconfig_dir
                  for pkgconfig_dir in gtk_root.rglob("pkgconfig")
                  if pkgconfig_dir.is_dir()
              }
          )
          for pkgconfig_dir in pkgconfig_dirs:
              for pc_file in pkgconfig_dir.glob("*.pc"):
                  content = pc_file.read_text()
                  content = re.sub(
                      r"^prefix=.*$",
                      f"prefix={gtk_root.as_posix()}",
                      content,
                      flags=re.MULTILINE,
                  )
                  pc_file.write_text(content)

          gtk4_pc = [pc_file for pkgconfig_dir in pkgconfig_dirs for pc_file in pkgconfig_dir.glob("gtk4.pc")]
          if not gtk4_pc:
              raise SystemExit(f"gtk4.pc not found under {gtk_root}")

          with github_env.open("a", encoding="utf-8") as env_file:
              env_file.write(f"GTK_PKG_CONFIG_DIRS={':'.join(path.as_posix() for path in pkgconfig_dirs)}\n")
          PY

      - name: Build upstream zju-connect
        shell: bash
        working-directory: _deps/zju-connect
        run: |
          mkdir -p "$RUNNER_TEMP/zju-connect-build"
          output_name="zju-connect"
          if [[ "$TARGET_OS" == "windows" ]]; then
            output_name="zju-connect.exe"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -o "$RUNNER_TEMP/zju-connect-build/$output_name" .

      - name: Download wintun runtime
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          zip_path="$RUNNER_TEMP/wintun.zip"
          extract_root="$RUNNER_TEMP/wintun"
          rm -rf "$extract_root"
          curl -fsSL "$WINTUN_URL" -o "$zip_path"
          unzip -q "$zip_path" -d "$extract_root"

      - name: Build native app (Windows)
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/app-build"
          export GTK_ROOT="$RUNNER_TEMP/gtk4-bundle/root"
          export PKG_CONFIG_PATH="$GTK_PKG_CONFIG_DIRS"
          export PKG_CONFIG_LIBDIR="$GTK_PKG_CONFIG_DIRS"
          export PKG_CONFIG_SYSTEM_INCLUDE_PATH="$GTK_ROOT/include"
          export PKG_CONFIG_SYSTEM_LIBRARY_PATH="$GTK_ROOT/lib"
          pkg-config --cflags gtk4
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 \
          go build -tags gtk4 -trimpath -ldflags='-H=windowsgui' -o "$RUNNER_TEMP/app-build/${APP_NAME}.exe" .

      - name: Build native app (non-Windows)
        if: matrix.target_os != 'windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/app-build"
          build_tags=""
          if [[ "$TARGET_OS" == "linux" ]]; then
            build_tags="-tags gtk4"
          fi
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 go build $build_tags -trimpath -o "$RUNNER_TEMP/app-build/$APP_NAME" .

      - name: Stage package contents
        shell: bash
        run: |
          app_binary="$RUNNER_TEMP/app-build/$APP_NAME"
          if [[ "$TARGET_OS" == "windows" ]]; then
            app_binary="$RUNNER_TEMP/app-build/${APP_NAME}.exe"
          fi
          args=(
            --target-os "$TARGET_OS"
            --arch "$GOARCH"
            --artifact-name "$ARTIFACT_NAME"
            --staging-root "$RUNNER_TEMP/stage"
            --app-binary "$app_binary"
          )
          if [[ "$TARGET_OS" == "windows" ]]; then
            args+=(
              --zju-connect "$RUNNER_TEMP/zju-connect-build/zju-connect.exe"
              --wintun "$RUNNER_TEMP/wintun/wintun/bin/${{ matrix.wintun_arch }}/wintun.dll"
              --windows-runtime-root "$RUNNER_TEMP/gtk4-bundle/root"
            )
          else
            args+=(--zju-connect "$RUNNER_TEMP/zju-connect-build/zju-connect")
          fi
          python scripts/package_ci_artifact.py "${args[@]}"

      - name: Create Linux archive
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "$RUNNER_TEMP/stage" -czf "$ARCHIVE_PATH" "$ARTIFACT_NAME"
          test -f "$ARCHIVE_PATH"

      - name: Create macOS archive
        if: matrix.target_os == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/stage/$ARTIFACT_NAME" "$ARCHIVE_PATH"
          test -f "$ARCHIVE_PATH"

      - name: Create Windows archive
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          rm -f "$ARCHIVE_PATH"
          (
            cd "$RUNNER_TEMP/stage"
            zip -qr "$GITHUB_WORKSPACE/$ARCHIVE_PATH" "$ARTIFACT_NAME"
          )
          test -f "$ARCHIVE_PATH"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          archive: false
          if-no-files-found: error
