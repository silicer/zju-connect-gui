name: build-packages

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  APP_NAME: zju-connect-gui
  GO_VERSION: '1.25.6'
  ZJU_CONNECT_REF: 5c0ac04ade80f90a67038aec240d470f122782e5
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run backend tests
        run: go test ./internal/backend

      - name: Install Linux native UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libayatana-appindicator3-dev

      - name: Build native desktop app
        run: go build .

  package:
    name: Package ${{ matrix.target_os }}/${{ matrix.goarch }}
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: windows
            goos: windows
            goarch: amd64
            runner: windows-latest
            archive_suffix: .zip
            wintun_arch: amd64
          - target_os: linux
            goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            archive_suffix: .tar.gz
            appimage_arch: x86_64
            wintun_arch: ''
          - target_os: linux
            goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive_suffix: .tar.gz
            appimage_arch: aarch64
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive_suffix: .zip
            wintun_arch: ''
          - target_os: macos
            goos: darwin
            goarch: arm64
            runner: macos-14
            archive_suffix: .zip
            wintun_arch: ''

    env:
      TARGET_OS: ${{ matrix.target_os }}
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      APPIMAGE_ARCH: ${{ matrix.appimage_arch }}
      ARTIFACT_NAME: ${{ format('zju-connect-gui-{0}-{1}', matrix.target_os, matrix.goarch) }}
      ARCHIVE_PATH: ${{ format('dist/zju-connect-gui-{0}-{1}{2}', matrix.target_os, matrix.goarch, matrix.archive_suffix) }}
      APPIMAGE_PATH: ${{ format('dist/zju-connect-gui-{0}-{1}.AppImage', matrix.target_os, matrix.goarch) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout upstream zju-connect
        uses: actions/checkout@v6
        with:
          repository: silicer/zju-connect
          ref: ${{ env.ZJU_CONNECT_REF }}
          path: _deps/zju-connect
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            _deps/zju-connect/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Linux build dependencies
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libgtk-3-bin libayatana-appindicator3-dev desktop-file-utils squashfs-tools

      - name: Build upstream zju-connect
        shell: bash
        working-directory: _deps/zju-connect
        run: |
          mkdir -p "$RUNNER_TEMP/zju-connect-build"
          output_name="zju-connect"
          if [[ "$TARGET_OS" == "windows" ]]; then
            output_name="zju-connect.exe"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -o "$RUNNER_TEMP/zju-connect-build/$output_name" .

      - name: Download wintun runtime
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'wintun'
          Invoke-WebRequest -Uri $env:WINTUN_URL -OutFile $zipPath
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

      - name: Build native app (Windows)
        if: matrix.target_os == 'windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/app-build"
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 go build -trimpath -ldflags='-H=windowsgui' -o "$RUNNER_TEMP/app-build/${APP_NAME}.exe" .

      - name: Build native app (non-Windows)
        if: matrix.target_os != 'windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/app-build"
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 go build -trimpath -o "$RUNNER_TEMP/app-build/$APP_NAME" .

      - name: Stage package contents
        shell: bash
        run: |
          app_binary="$RUNNER_TEMP/app-build/$APP_NAME"
          if [[ "$TARGET_OS" == "windows" ]]; then
            app_binary="$RUNNER_TEMP/app-build/${APP_NAME}.exe"
          fi
          args=(
            --target-os "$TARGET_OS"
            --arch "$GOARCH"
            --artifact-name "$ARTIFACT_NAME"
            --staging-root "$RUNNER_TEMP/stage"
            --app-binary "$app_binary"
          )
          if [[ "$TARGET_OS" == "windows" ]]; then
            args+=(
              --zju-connect "$RUNNER_TEMP/zju-connect-build/zju-connect.exe"
              --wintun "$RUNNER_TEMP/wintun/wintun/bin/${{ matrix.wintun_arch }}/wintun.dll"
            )
          else
            args+=(--zju-connect "$RUNNER_TEMP/zju-connect-build/zju-connect")
          fi
          python scripts/package_ci_artifact.py "${args[@]}"

      - name: Download linuxdeploy tooling
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          curl -fL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${APPIMAGE_ARCH}.AppImage" -o "$RUNNER_TEMP/linuxdeploy-${APPIMAGE_ARCH}.AppImage"
          curl -fL "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" -o "$RUNNER_TEMP/linuxdeploy-plugin-gtk.sh"
          chmod +x "$RUNNER_TEMP/linuxdeploy-${APPIMAGE_ARCH}.AppImage"
          chmod +x "$RUNNER_TEMP/linuxdeploy-plugin-gtk.sh"

      - name: Create Linux archive
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "$RUNNER_TEMP/stage" -czf "$ARCHIVE_PATH" "$ARTIFACT_NAME"
          test -f "$ARCHIVE_PATH"

      - name: Create Linux AppImage
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          chmod +x scripts/build_linux_appimage.sh
          scripts/build_linux_appimage.sh "$RUNNER_TEMP/stage/$ARTIFACT_NAME" "$GOARCH" "$ARTIFACT_NAME" "${GITHUB_SHA}-${GOARCH}" "$APPIMAGE_PATH"
          test -f "$APPIMAGE_PATH"

      - name: Smoke check Linux AppImage contents
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          smoke_dir="$RUNNER_TEMP/appimage-smoke-${GOARCH}"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          cp "$APPIMAGE_PATH" "$smoke_dir/app.AppImage"
          chmod +x "$smoke_dir/app.AppImage"
          (
            cd "$smoke_dir"
            ./app.AppImage --appimage-extract >/dev/null
            test -x squashfs-root/usr/bin/zju-connect-gui-launcher
            test -f squashfs-root/usr/share/applications/zju-connect-gui.desktop
            test -f squashfs-root/usr/share/icons/hicolor/512x512/apps/zju-connect-gui.png
            test -x squashfs-root/usr/lib/zju-connect-gui/runtime/zju-connect-gui
            test -x squashfs-root/usr/lib/zju-connect-gui/runtime/bin/zju-connect
            test -f squashfs-root/usr/lib/zju-connect-gui/runtime/.bundle-stamp
          )

      - name: Create macOS archive
        if: matrix.target_os == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/stage/$ARTIFACT_NAME" "$ARCHIVE_PATH"
          test -f "$ARCHIVE_PATH"

      - name: Create Windows archive
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Join-Path $env:GITHUB_WORKSPACE 'dist') | Out-Null
          $source = Join-Path $env:RUNNER_TEMP (Join-Path 'stage' $env:ARTIFACT_NAME)
          $destination = Join-Path $env:GITHUB_WORKSPACE $env:ARCHIVE_PATH
          if (Test-Path $destination) {
            Remove-Item -Force $destination
          }
          Compress-Archive -Path $source -DestinationPath $destination -Force
          if (-not (Test-Path $destination)) {
            throw "Archive missing: $destination"
          }

      - name: Upload packaged artifact
        if: matrix.target_os != 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          archive: false
          if-no-files-found: error

      - name: Upload packaged Linux artifacts
        if: matrix.target_os == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.APPIMAGE_PATH }}
          archive: false
          if-no-files-found: error
